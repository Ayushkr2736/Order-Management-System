name: CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run ESLint
        working-directory: backend
        run: npm run lint

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: orderdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d orderdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Seed database
        run: |
          PGPASSWORD=admin123 psql -h localhost -U admin -d orderdb -f db/init.sql

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Start backend server
        working-directory: backend
        env:
          PORT: 3001
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: admin
          DB_PASSWORD: admin123
          DB_NAME: orderdb
        run: |
          node src/index.js &
          echo "Waiting for server to start..."
          sleep 5

      - name: Health check - API responds
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health)
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Health check passed (HTTP 200)"

      - name: Health check - Orders endpoint responds
        run: |
          RESPONSE=$(curl -s http://localhost:3001/api/orders)
          if echo "$RESPONSE" | grep -q "error"; then
            echo "❌ Orders endpoint returned an error: $RESPONSE"
            exit 1
          fi
          echo "✅ Orders endpoint responded successfully"

      - name: Health check - Products endpoint responds
        run: |
          RESPONSE=$(curl -s http://localhost:3001/api/products)
          if echo "$RESPONSE" | grep -q "error"; then
            echo "❌ Products endpoint returned an error: $RESPONSE"
            exit 1
          fi
          echo "✅ Products endpoint responded successfully"
